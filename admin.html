<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <title>Admin - SmartLight</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #4a90e2 0%, #1e3c72 100%);
            min-height: 100vh;
            display: none;
        }

        .navbar {
            background: #1e3c72;
        }

        .navbar-brand {
            font-weight: bold;
        }

        .card-dashboard {
            border-radius: 12px;
            border: none;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
        }

        .table img {
            width: 60px;
            border-radius: 6px;
        }

        .section-title {
            font-weight: 600;
        }
    </style>
</head>

<body>

    <!-- NAVBAR -->

    <nav class="navbar navbar-dark fixed-top">
        <div class="container-fluid">

            <a class="navbar-brand">
                <i class="bi bi-lightbulb"></i>
                SmartLight Admin
            </a>

            <div class="d-flex align-items-center">
                <span class="text-white me-3" id="userName"></span>

                <button class="btn btn-outline-light btn-sm" id="btnLogout">
                    Terminar Sessão
                </button>
            </div>

        </div>
    </nav>

    <div class="container mt-5 pt-5">

        <!-- DASHBOARD -->

        <div class="row mb-4">

            <div class="col-md-4">
                <div class="card card-dashboard p-3 text-center">
                    <h6>Total Reportes</h6>
                    <h3 id="totalReportes">0</h3>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card card-dashboard p-3 text-center">
                    <h6>Pendentes</h6>
                    <h3 id="totalPendentes">0</h3>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card card-dashboard p-3 text-center">
                    <h6>Resolvidos</h6>
                    <h3 id="totalResolvidos">0</h3>
                </div>
            </div>

        </div>

        <!-- TABELA -->

        <div class="card card-dashboard p-4">

            <h5 class="section-title mb-3">
                <i class="bi bi-list-ul"></i>
                Lista de Reportes
            </h5>

            <div class="table-responsive">

                <table class="table table-hover align-middle">

                    <thead class="table-dark">
                        <tr>

                            <th>Poste</th>
                            <th>Problema</th>
                            <th>Coordenadas</th>
                            <th>Status</th>
                            <th>Data</th>
                            <th>Ação</th>

                        </tr>
                    </thead>

                    <tbody id="listaReportes"></tbody>

                </table>

            </div>

        </div>

    </div>

    <!-- MODAL TÉCNICOS -->

    <div class="modal fade" id="modalTecnico">

        <div class="modal-dialog">

            <div class="modal-content">

                <div class="modal-header">

                    <h5>Encaminhar para Técnico</h5>

                    <button class="btn-close" data-bs-dismiss="modal"></button>

                </div>

                <div class="modal-body">

                    <select class="form-select mb-3" id="listaTecnicos"></select>

                    <textarea class="form-control" id="mensagemTecnico"
                        placeholder="Mensagem para o técnico"></textarea>

                </div>

                <div class="modal-footer">

                    <button class="btn btn-primary" onclick="confirmarEncaminhamento()">
                        Enviar
                    </button>

                </div>

            </div>

        </div>

    </div>

    <script type="module">

        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, get, child } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        import {
            getFirestore,
            collection,
            getDocs,
            onSnapshot,
            doc,
            updateDoc,
            addDoc
        }

            from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyADBRS5V1sFXzHh3KOrNivsEJJkwpuGJWk",
            authDomain: "smartlight-pap-2026.firebaseapp.com",
            projectId: "smartlight-pap-2026",
            storageBucket: "smartlight-pap-2026.appspot.com",
            messagingSenderId: "953509556806",
            appId: "1:953509556806:web:96ed896142e7b5433f5047"
        };

        const app = initializeApp(firebaseConfig);
        const dbRealtime = getDatabase(app);
        const auth = getAuth(app);

        const db = getFirestore(app);

        const adminEmail = "adminsmartlight@gmail.com";

        let reporteSelecionado = null;

        document.body.style.display = "block";

        onAuthStateChanged(auth, (user) => {

            if (!user || user.email !== adminEmail) {

                window.location.href = "index.html";

            }

        });

        document.getElementById("btnLogout").onclick = async () => {

            await signOut(auth);

            window.location.href = "index.html";

        };

        /* LISTAR REPORTES */

        const tabela = document.getElementById("listaReportes");

        const reportsRef = collection(db, "reports");

        onSnapshot(reportsRef, (snapshot) => {

            tabela.innerHTML = "";

            let total = 0;

            let pendentes = 0;

            let resolvidos = 0;

            snapshot.forEach(docSnap => {

                const data = docSnap.data();

                const id = docSnap.id;

                total++;

                if (data.status === "pendente") pendentes++;

                if (data.status === "resolvido") resolvidos++;

                tabela.innerHTML += `

<tr>

<td>${data.posteId}</td>

<td>${data.tipo}</td>

<td>${data.coords || ""}</td>

<td>

<span class="badge ${data.status === "resolvido"
                        ? "bg-success"
                        : data.status === "encaminhado"
                            ? "bg-info"
                            : "bg-warning"}">

${data.status || "pendente"}

</span>

</td>

<td>

${data.data?.toDate().toLocaleString() || ""}

</td>

<td>

<button class="btn btn-sm btn-primary"
onclick="abrirModal('${id}')">

Encaminhar

</button>

</td>

</tr>

`;

            });

            document.getElementById("totalReportes").innerText = total;
            document.getElementById("totalPendentes").innerText = pendentes;
            document.getElementById("totalResolvidos").innerText = resolvidos;

        });

        /* ABRIR MODAL */

        window.abrirModal = async (id) => {

reporteSelecionado = id;

const select = document.getElementById("listaTecnicos");

select.innerHTML = "<option>Carregando técnicos...</option>";

try{

const snapshot = await get(ref(dbRealtime,"usuarios"));

select.innerHTML = "";

if(!snapshot.exists()){

select.innerHTML = "<option>Nenhum técnico encontrado</option>";

return;

}

const usuarios = snapshot.val();

Object.keys(usuarios).forEach(uid => {

const user = usuarios[uid];

if(user.tipoConta === "tecnico"){

const option = document.createElement("option");

option.value = uid;

option.textContent = `${user.nome || "Técnico"} - ${user.bairro || ""}`;

select.appendChild(option);

}

});

}catch(err){

console.error(err);

select.innerHTML = "<option>Erro ao carregar técnicos</option>";

}

new bootstrap.Modal(document.getElementById("modalTecnico")).show();

};

        /* CONFIRMAR ENCAMINHAMENTO */

        window.confirmarEncaminhamento = async () => {

            const tecnicoId = document.getElementById("listaTecnicos").value;

            const mensagem = document.getElementById("mensagemTecnico").value;

            if (!tecnicoId) return alert("Selecione um técnico");

            await updateDoc(doc(db, "reports", reporteSelecionado), {

                status: "encaminhado",
                tecnico: tecnicoId

            });

            /* CRIAR NOTIFICAÇÃO PARA TÉCNICO */

            await addDoc(collection(db, "tecnicos", tecnicoId, "notificacoes"), {

                reporteId: reporteSelecionado,
                mensagem: mensagem,
                status: "pendente",
                data: new Date()

            });

            alert("Reporte encaminhado!");

            location.reload();

        };

    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
